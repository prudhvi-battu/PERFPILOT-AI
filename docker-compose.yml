version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: perf-db
    environment:
      POSTGRES_DB: ecommerce_perf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-network

  # E-Commerce Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perf-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce_perf
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: perf-testing-assistant-jwt-secret-2024-prod
      METRICS_PORT: 9090
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node database/migrate.js && node database/seed.js && node server.js"
    networks:
      - perf-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: perf-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - perf-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: perf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/ecommerce-performance-dashboard.json
    volumes:
      - ./grafana-dashboard:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - perf-network

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: perf-pg-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/ecommerce_perf?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - perf-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  perf-network:
    driver: bridge
