services:
  - type: web
    name: perfpilot-ai
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
    plan: free
